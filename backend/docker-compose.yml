version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: civiclens-mongodb
    environment:
      MONGO_INITDB_DATABASE: civiclens
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - civiclens-network

  backend:
    build: .
    container_name: civiclens-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/civiclens
      JWT_SECRET: dev_secret_key_change_in_production
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - civiclens-network
    command: npm run dev

volumes:
  mongodb_data:

networks:
  civiclens-network:
    driver: bridge
